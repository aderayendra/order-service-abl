server:
  port: 8081
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mariadb://localhost:3306/simple-order-service
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
product-service:
  url: http://product-service/api/produk
